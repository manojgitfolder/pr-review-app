name: PR Code Review with DeepSeek

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Run unit tests first
  # ─────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    outputs:
      tests_passed: ${{ steps.test_result.outputs.passed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        id: run_tests
        run: npm run test:ci
        continue-on-error: true

      - name: Set test result output
        id: test_result
        run: |
          if [ "${{ steps.run_tests.outcome }}" = "success" ]; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ─────────────────────────────────────────
  # JOB 2: AI Code Review
  # ─────────────────────────────────────────
  ai-code-review:
    name: DeepSeek AI Code Review
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 1: Extract PR diff ──────────
      - name: Extract PR diff
        id: get_diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the full diff of the PR
          git fetch origin ${{ github.base_ref }}
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.js' '*.jsx' '*.ts' '*.tsx' '*.py' | head -c 15000)

          # Save to file to avoid shell escaping issues
          echo "$DIFF" > /tmp/pr_diff.txt

          # Also get list of changed files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "Diff extracted: $(wc -c < /tmp/pr_diff.txt) bytes"

      # ── Step 2: Extract Jira ticket from PR ──
      - name: Extract Jira ticket from PR description
        id: get_jira
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch PR body via GitHub API
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body --jq '.body // ""')

          # Extract Jira ticket key (e.g. PROJ-123, ABC-456)
          JIRA_KEY=$(echo "$PR_BODY" | grep -oE '[A-Z][A-Z0-9]+-[0-9]+' | head -1)

          if [ -z "$JIRA_KEY" ]; then
            # Also try to extract from PR title
            PR_TITLE=$(gh pr view ${{ github.event.pull_request.number }} --json title --jq '.title')
            JIRA_KEY=$(echo "$PR_TITLE" | grep -oE '[A-Z][A-Z0-9]+-[0-9]+' | head -1)
          fi

          echo "jira_key=$JIRA_KEY" >> $GITHUB_OUTPUT
          echo "Found Jira key: $JIRA_KEY"

      # ── Step 3: Fetch Jira acceptance criteria ──
      - name: Fetch Jira acceptance criteria
        id: get_jira_ac
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          JIRA_KEY="${{ steps.get_jira.outputs.jira_key }}"

          if [ -z "$JIRA_KEY" ]; then
            echo "No Jira ticket found in PR. Skipping AC fetch."
            echo "acceptance_criteria=No Jira ticket linked. Review code for general quality only." > /tmp/jira_ac.txt
            echo "jira_summary=No Jira ticket linked" >> $GITHUB_OUTPUT
          else
            echo "Fetching Jira ticket: $JIRA_KEY"

            # Call Jira REST API
            HTTP_STATUS=$(curl -s -o /tmp/jira_response.json -w "%{http_code}" \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              "$JIRA_BASE_URL/rest/api/3/issue/$JIRA_KEY?fields=summary,description,customfield_10016,customfield_10033,acceptance_criteria")

            if [ "$HTTP_STATUS" = "200" ]; then
              # Extract summary
              SUMMARY=$(cat /tmp/jira_response.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(data.get('fields', {}).get('summary', 'No summary'))
          ")
              echo "jira_summary=$SUMMARY" >> $GITHUB_OUTPUT

              # Extract acceptance criteria - tries multiple common field names
              python3 << 'PYEOF'
          import json

          with open('/tmp/jira_response.json') as f:
              data = json.load(f)

          fields = data.get('fields', {})

          # Try different AC field locations
          ac = ''

          # Custom field for acceptance criteria (common field IDs)
          for field_name in ['customfield_10033', 'customfield_10016', 'customfield_10014']:
              val = fields.get(field_name)
              if val and isinstance(val, str) and len(val) > 10:
                  ac = val
                  break
              elif val and isinstance(val, dict):
                  # Atlassian Document Format
                  try:
                      content = val.get('content', [])
                      texts = []
                      for block in content:
                          for item in block.get('content', []):
                              if item.get('type') == 'text':
                                  texts.append(item.get('text', ''))
                      ac = ' '.join(texts)
                  except:
                      pass
                  if ac:
                      break

          # Fallback: use description
          if not ac:
              desc = fields.get('description', {})
              if isinstance(desc, dict):
                  try:
                      content = desc.get('content', [])
                      texts = []
                      for block in content:
                          for item in block.get('content', []):
                              if item.get('type') == 'text':
                                  texts.append(item.get('text', ''))
                      ac = ' '.join(texts)[:2000]
                  except:
                      ac = 'Could not parse description'
              elif isinstance(desc, str):
                  ac = desc[:2000]
              else:
                  ac = 'No acceptance criteria found'

          with open('/tmp/jira_ac.txt', 'w') as f:
              f.write(f"acceptance_criteria={ac}")

          print(f"AC extracted: {len(ac)} chars")
          PYEOF
            else
              echo "Failed to fetch Jira ticket (HTTP $HTTP_STATUS)"
              echo "acceptance_criteria=Could not fetch Jira ticket $JIRA_KEY (HTTP $HTTP_STATUS). Review code for general quality." > /tmp/jira_ac.txt
              echo "jira_summary=Fetch failed" >> $GITHUB_OUTPUT
            fi
          fi

          # Read AC back as output (truncate to 3000 chars for env safety)
          AC=$(cat /tmp/jira_ac.txt | head -c 3000)
          echo "acceptance_criteria<<EOF" >> $GITHUB_OUTPUT
          echo "$AC" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── Step 4: Send to DeepSeek for review ──
      - name: AI Code Review via DeepSeek
        id: ai_review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          DIFF=$(cat /tmp/pr_diff.txt)
          AC="${{ steps.get_jira_ac.outputs.acceptance_criteria }}"
          JIRA_KEY="${{ steps.get_jira.outputs.jira_key }}"
          JIRA_SUMMARY="${{ steps.get_jira_ac.outputs.jira_summary }}"
          TEST_PASSED="${{ needs.test.outputs.tests_passed }}"

          python3 << PYEOF
          import json, os, sys
          import urllib.request
          import urllib.error

          diff = open('/tmp/pr_diff.txt').read()
          ac = os.environ.get('AC', '')
          jira_key = os.environ.get('JIRA_KEY', 'N/A')
          jira_summary = os.environ.get('JIRA_SUMMARY', 'N/A')
          tests_passed = os.environ.get('TEST_PASSED', 'false')

          prompt = f"""You are a senior software engineer performing a code review.

          ## Jira Ticket
          - Key: {jira_key}
          - Summary: {jira_summary}

          ## Acceptance Criteria
          {ac}

          ## Unit Tests Status
          Tests passed: {tests_passed}

          ## Code Diff (PR changes)
          ```diff
          {diff[:12000]}
          ```

          ## Instructions
          Review this PR against the acceptance criteria. Return a JSON object ONLY (no markdown, no explanation):

          {{
            "overall_status": "APPROVE" or "REQUEST_CHANGES",
            "summary": "Brief 2-3 sentence overall assessment",
            "meets_acceptance_criteria": true or false,
            "comments": [
              {{
                "file": "path/to/file.jsx",
                "line": 42,
                "severity": "error|warning|suggestion",
                "message": "Specific actionable comment about this line"
              }}
            ],
            "approval_reason": "Why approved or what must be fixed before approval"
          }}

          Rules:
          - Only include comments for real issues, not nitpicks
          - Line numbers must match the diff (lines starting with + or unchanged)
          - overall_status = APPROVE only if: meets_acceptance_criteria=true AND no errors AND tests passed
          - Be concise and specific in comments
          """

          api_key = os.environ.get('DEEPSEEK_API_KEY', '')
          if not api_key:
              print("ERROR: DEEPSEEK_API_KEY not set")
              sys.exit(1)

          payload = json.dumps({
              "model": "deepseek-chat",
              "messages": [{"role": "user", "content": prompt}],
              "temperature": 0.1,
              "max_tokens": 2000
          }).encode('utf-8')

          req = urllib.request.Request(
              'https://api.deepseek.com/v1/chat/completions',
              data=payload,
              headers={
                  'Content-Type': 'application/json',
                  'Authorization': f'Bearer {api_key}'
              }
          )

          try:
              with urllib.request.urlopen(req, timeout=60) as resp:
                  result = json.loads(resp.read().decode('utf-8'))
                  content = result['choices'][0]['message']['content']

                  # Strip markdown code fences if present
                  content = content.strip()
                  if content.startswith('```'):
                      content = content.split('\n', 1)[1]
                      content = content.rsplit('```', 1)[0]
                  content = content.strip()

                  # Validate JSON
                  review = json.loads(content)

                  with open('/tmp/review_result.json', 'w') as f:
                      json.dump(review, f, indent=2)

                  print(f"Review complete: {review.get('overall_status')}")
                  print(f"Comments: {len(review.get('comments', []))}")

          except urllib.error.HTTPError as e:
              error_body = e.read().decode('utf-8')
              print(f"DeepSeek API error {e.code}: {error_body}")
              # Write fallback review
              fallback = {
                  "overall_status": "REQUEST_CHANGES",
                  "summary": f"AI review failed (API error {e.code}). Manual review required.",
                  "meets_acceptance_criteria": False,
                  "comments": [],
                  "approval_reason": "Automated review could not complete. Please review manually."
              }
              with open('/tmp/review_result.json', 'w') as f:
                  json.dump(fallback, f, indent=2)

          except Exception as e:
              print(f"Unexpected error: {e}")
              fallback = {
                  "overall_status": "REQUEST_CHANGES",
                  "summary": f"AI review failed: {str(e)}. Manual review required.",
                  "meets_acceptance_criteria": False,
                  "comments": [],
                  "approval_reason": "Automated review could not complete."
              }
              with open('/tmp/review_result.json', 'w') as f:
                  json.dump(fallback, f, indent=2)
          PYEOF

          # Extract status for next steps
          STATUS=$(python3 -c "import json; d=json.load(open('/tmp/review_result.json')); print(d.get('overall_status','REQUEST_CHANGES'))")
          echo "review_status=$STATUS" >> $GITHUB_OUTPUT
          echo "Review status: $STATUS"
        env:
          AC: ${{ steps.get_jira_ac.outputs.acceptance_criteria }}
          JIRA_KEY: ${{ steps.get_jira.outputs.jira_key }}
          JIRA_SUMMARY: ${{ steps.get_jira_ac.outputs.jira_summary }}
          TEST_PASSED: ${{ needs.test.outputs.tests_passed }}

      # ── Step 5: Post review comments to PR ──
      - name: Post review comments to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys
          import urllib.request
          import urllib.error

          with open('/tmp/review_result.json') as f:
              review = json.load(f)

          token = os.environ['GH_TOKEN']
          repo = os.environ['GITHUB_REPOSITORY']
          pr_number = os.environ['PR_NUMBER']
          commit_sha = os.environ['PR_COMMIT_SHA']

          base_url = f"https://api.github.com/repos/{repo}"
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json'
          }

          def gh_request(url, payload):
              req = urllib.request.Request(url, data=json.dumps(payload).encode(), headers=headers)
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read()), resp.status
              except urllib.error.HTTPError as e:
                  print(f"GitHub API error {e.code}: {e.read().decode()}")
                  return None, e.code

          # ── 5a: Post summary as PR comment ──
          status_emoji = "✅" if review['overall_status'] == 'APPROVE' else "❌"
          ac_emoji = "✅" if review.get('meets_acceptance_criteria') else "❌"
          tests_emoji = "✅" if "${{ needs.test.outputs.tests_passed }}" == "true" else "❌"

          jira_key = os.environ.get('JIRA_KEY', 'N/A')
          jira_link = ""
          jira_base = os.environ.get('JIRA_BASE_URL', '')
          if jira_key and jira_key != 'N/A' and jira_base:
              jira_link = f"[{jira_key}]({jira_base}/browse/{jira_key})"
          else:
              jira_link = jira_key or "Not linked"

          comment_body = f"""## 🤖 DeepSeek AI Code Review

          | Check | Status |
          |-------|--------|
          | Overall | {status_emoji} **{review['overall_status']}** |
          | Unit Tests | {tests_emoji} {'Passed' if "${{ needs.test.outputs.tests_passed }}" == "true" else 'Failed'} |
          | Acceptance Criteria | {ac_emoji} {'Met' if review.get('meets_acceptance_criteria') else 'Not met'} |
          | Jira Ticket | {jira_link} |

          ### Summary
          {review.get('summary', 'No summary provided')}

          ### Decision
          {review.get('approval_reason', '')}

          ---
          *Reviewed by DeepSeek AI • {len(review.get('comments', []))} inline comment(s)*
          """

          comment_payload = {"body": comment_body}
          result, status = gh_request(
              f"{base_url}/issues/{pr_number}/comments",
              comment_payload
          )
          print(f"Summary comment posted: HTTP {status}")

          # ── 5b: Post inline review with line comments ──
          comments = review.get('comments', [])
          review_comments = []

          severity_emoji = {'error': '🔴', 'warning': '🟡', 'suggestion': '🔵'}

          for c in comments:
              file_path = c.get('file', '')
              line = c.get('line')
              message = c.get('message', '')
              severity = c.get('severity', 'suggestion')

              if not file_path or not line or not message:
                  continue

              emoji = severity_emoji.get(severity, '💬')
              review_comments.append({
                  "path": file_path,
                  "line": int(line),
                  "side": "RIGHT",
                  "body": f"{emoji} **{severity.upper()}**\n\n{message}"
              })

          # Determine review event
          review_event = "APPROVE" if review['overall_status'] == 'APPROVE' else "REQUEST_CHANGES"

          review_payload = {
              "commit_id": commit_sha,
              "body": f"{'✅ Approving' if review_event == 'APPROVE' else '❌ Requesting changes'}: {review.get('approval_reason', '')}",
              "event": review_event,
              "comments": review_comments
          }

          result, status = gh_request(
              f"{base_url}/pulls/{pr_number}/reviews",
              review_payload
          )

          if status in [200, 201]:
              print(f"Review submitted: {review_event} with {len(review_comments)} inline comments")
          else:
              # If inline comments fail (e.g. line mismatch), submit review without comments
              print(f"Retrying without inline comments...")
              review_payload['comments'] = []
              result, status = gh_request(
                  f"{base_url}/pulls/{pr_number}/reviews",
                  review_payload
              )
              print(f"Review submitted without inline comments: HTTP {status}")

          PYEOF
        env:
          JIRA_KEY: ${{ steps.get_jira.outputs.jira_key }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}

      # ── Step 6: Fail the job if changes requested ──
      - name: Check review result
        run: |
          STATUS=$(python3 -c "import json; d=json.load(open('/tmp/review_result.json')); print(d.get('overall_status','REQUEST_CHANGES'))")
          echo "Final review status: $STATUS"
          if [ "$STATUS" != "APPROVE" ]; then
            echo "❌ AI review requested changes. Please address the comments."
            exit 1
          else
            echo "✅ AI review approved the PR!"
          fi
